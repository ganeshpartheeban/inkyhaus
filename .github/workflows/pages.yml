# Temporary static preview on GitHub Pages.
# Builds the prerendered static site (vite.config.pages.ts) and publishes it.
# The production deploy target remains Cloudflare Workers (npm run deploy).
#
# One-time setup: repo Settings → Pages → Build and deployment → Source:
# "GitHub Actions". (Optional) add repo secrets VITE_FORM_ENDPOINT and
# VITE_FORM_TOKEN so the enquiry form submits; without them the page still
# builds and renders, the form just no-ops.
name: Deploy preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build static site
        env:
          PAGES_BASE: /inkyhaus/
          VITE_FORM_ENDPOINT: ${{ secrets.VITE_FORM_ENDPOINT }}
          VITE_FORM_TOKEN: ${{ secrets.VITE_FORM_TOKEN }}
        run: npx vite build --config vite.config.pages.ts
      - name: SPA fallback + disable Jekyll
        run: |
          cp dist/client/index.html dist/client/404.html
          touch dist/client/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
